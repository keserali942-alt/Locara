name: Mobile Phase Gate

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  verify-mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Show tool versions
        run: |
          flutter --version
          dart --version

      - name: Prepare CI env file
        run: |
          cat > .env << 'EOF'
          SUPABASE_URL=https://example.supabase.co
          SUPABASE_ANON_KEY=ci-anon-key
          ENVIRONMENT=ci
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Ensure Android scaffold exists
        run: |
          if [ ! -f android/app/build.gradle ] && [ ! -f android/app/build.gradle.kts ]; then
            flutter create --platforms=android --project-name locora_mobile .
          fi

      - name: Static analysis
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build Android APK (debug)
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: locora-debug-apk
          path: mobile/build/app/outputs/flutter-apk/app-debug.apk
